kind = "web"
previewPath = "/"
title = "ICAR-IARI Assam Website"
version = "1.0.0"
id = "artifacts/iari-assam"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24444

[services.development]
run = "pnpm --filter @workspace/iari-assam run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iari-assam", "run", "build" ]
publicDir = "artifacts/iari-assam/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24444"
BASE_PATH = "/"
